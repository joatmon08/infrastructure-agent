apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-client
  labels:
    app: test-client
---
apiVersion: v1
kind: Secret
metadata:
  name: test-client-token
  labels:
    app: test-client
  annotations:
    kubernetes.io/service-account.name: test-client
type: kubernetes.io/service-account-token
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-client
  labels:
    app: test-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-client
  template:
    metadata:
      labels:
        app: test-client
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "test-client"
        vault.hashicorp.com/agent-inject-token: "true"
        vault.hashicorp.com/agent-run-as-same-user: "true"
        vault.hashicorp.com/tls-skip-verify: "true"
        vault.hashicorp.com/agent-inject-secret-client_secrets.json: "identity/oidc/client/agent"
        vault.hashicorp.com/agent-inject-template-client_secrets.json: |
          {
          {{- with secret "identity/oidc/client/agent" }}
              "client_id": "{{ .Data.client_id }}",
              "client_secret": "{{ .Data.client_secret }}",
              "redirect_uris": {{ .Data.redirect_uris | toJSON }}
          {{- end }}
          }
        vault.hashicorp.com/agent-inject-secret-oidc_provider.json: "identity/oidc/provider/agent/.well-known/openid-configuration"
        vault.hashicorp.com/agent-inject-template-oidc_provider.json: |
          {
          {{- with secret "identity/oidc/provider/agent/.well-known/openid-configuration" }}
              "authorization_endpoint": "{{ .Data.authorization_endpoint }}",
              "issuer": "{{ .Data.issuer }}",
              "token_endpoint": "{{ .Data.token_endpoint }}",
              "userinfo_endpoint": "{{ .Data.userinfo_endpoint }}"
          {{- end }}
          }
    spec:
      serviceAccountName: test-client
      containers:
      - name: test-client
        image: 224382219437.dkr.ecr.us-east-1.amazonaws.com/infra-agent-test-client:6edf79d4dee12d99897a654e0301fbfcd9a54fad
        ports:
        - containerPort: 9000
          name: http
          protocol: TCP
        env:
        - name: AGENT_URL
          valueFrom:
            configMapKeyRef:
              name: helloworld-agent-server
              key: AGENT_URL
        - name: BASE_URL
          valueFrom:
            configMapKeyRef:
              name: test-client
              key: BASE_URL
        - name: OIDC_PROVIDER_CONFIG_PATH
          value: /vault/secrets/oidc_provider.json
        - name: CLIENT_SECRETS_PATH
          value: /vault/secrets/client_secrets.json
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false